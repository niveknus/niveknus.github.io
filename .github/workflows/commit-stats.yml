name: Update Commit Stats

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = ~1 AM CT daily
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

# Serialize runs so two concurrent runs don't race each other on push.
concurrency:
  group: commit-stats
  cancel-in-progress: false

jobs:
  build-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate commit data
        env:
          GH_TOKEN: ${{ secrets.STATS_PAT }}
        run: python3 scripts/generate-commit-stats.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update commit stats [skip ci]"
          # Retry against a moving main: rebase our single commit onto the
          # latest remote and push, in case another push landed meanwhile.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on origin/main and retrying."
            git pull --rebase origin main
          done
          echo "::error::Failed to push commit stats after 5 attempts."
          exit 1
