name: Update Commit Stats

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = ~1 AM CT daily
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  build-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate commit data
        env:
          GH_TOKEN: ${{ secrets.STATS_PAT }}
        run: python3 scripts/generate-commit-stats.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-data.json
          git diff --staged --quiet || (git commit -m "chore: update commit stats [skip ci]" && git push)
